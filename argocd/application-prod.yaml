# =============================================================================
# ArgoCD Application — Production Environment
# =============================================================================
# WHY: Production uses MANUAL sync to prevent accidental auto-deployments.
#      Changes must be explicitly approved before going live.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-boutique-prod
  namespace: argocd
  labels:
    environment: production
    team: sre
spec:
  project: default
  source:
    repoURL: 'https://github.com/grvtech1/online-boutique-devops.git'
    targetRevision: main
    path: kustomize/overlays/prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: boutique
  syncPolicy:
    # MANUAL sync for production — no automated deployments
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
