# Opt-in component: gives reviewsservice a durable, shared PostgreSQL store.
# Enable it from an overlay's `components:` list. With this enabled the store is
# shared across pods, so reviewsservice may safely scale beyond one replica (and
# an HPA can be added).
#
# Example (overlays/<env>/kustomization.yaml):
#   components:
#     - ../../components/reviews-persistence
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - postgres.yaml

patches:
  # Point reviewsservice at the database. Setting DATABASE_URL flips the service
  # from the in-memory store to the PostgreSQL store at startup.
  - target:
      kind: Deployment
      name: reviewsservice
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: reviews-db
              key: database-url
