# PostgreSQL backing store for reviewsservice. Demo-grade single instance with a
# PVC for durability. For real production prefer a managed database (RDS/Cloud
# SQL) and a Secret sourced from a secret manager rather than this in-repo Secret.
---
apiVersion: v1
kind: Secret
metadata:
  name: reviews-db
type: Opaque
stringData:
  POSTGRES_DB: reviews
  POSTGRES_USER: reviews
  # Demo password — rotate / source from a secret manager for real deployments.
  POSTGRES_PASSWORD: reviews-demo-pw
  database-url: "postgres://reviews:reviews-demo-pw@reviews-db:5432/reviews?sslmode=disable"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: reviews-db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # Requires a default StorageClass / dynamic provisioner (e.g. EBS CSI). On a
  # cluster without one, pre-create a PV or set storageClassName explicitly.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reviews-db
  labels:
    app: reviews-db
spec:
  replicas: 1
  # A single PVC (RWO) can't be mounted by two pods, so never run two at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: reviews-db
  template:
    metadata:
      labels:
        app: reviews-db
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 70   # postgres user in the alpine image
        runAsGroup: 70
        fsGroup: 70
      containers:
        - name: postgres
          image: postgres:16-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - secretRef:
                name: reviews-db
          env:
            # Keep the data in a subdir so the PVC's lost+found doesn't clash.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "reviews", "-d", "reviews"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "reviews", "-d", "reviews"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: reviews-db
---
apiVersion: v1
kind: Service
metadata:
  name: reviews-db
  labels:
    app: reviews-db
spec:
  type: ClusterIP
  selector:
    app: reviews-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
