apiVersion: apps/v1
kind: Deployment
metadata:
  name: reviewsservice
  labels:
    app: reviewsservice
spec:
  selector:
    matchLabels:
      app: reviewsservice
  template:
    metadata:
      labels:
        app: reviewsservice
    spec:
      serviceAccountName: reviewsservice
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: server
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: true
        # Built and pushed by the CD pipeline. Change the registry/owner to match
        # your DOCKER_USERNAME if it is not "grvtech1".
        image: docker.io/grvtech1/reviewsservice:latest
        ports:
        - containerPort: 50051
        env:
        - name: PORT
          value: "50051"
        readinessProbe:
          periodSeconds: 5
          grpc:
            port: 50051
        livenessProbe:
          grpc:
            port: 50051
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: reviewsservice
  labels:
    app: reviewsservice
spec:
  type: ClusterIP
  selector:
    app: reviewsservice
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: reviewsservice
