apiVersion: apps/v1
kind: Deployment
metadata:
  name: reviewsservice
  labels:
    app: reviewsservice
spec:
  # IMPORTANT: keep this at a single replica and do NOT attach an HPA. The store
  # is in-process and not shared across pods; multiple replicas would each hold a
  # divergent copy of the reviews. Scale out only after moving to a shared
  # datastore (see src/reviewsservice/reviews.go — the Store interface seam).
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: reviewsservice
  template:
    metadata:
      labels:
        app: reviewsservice
    spec:
      serviceAccountName: reviewsservice
      terminationGracePeriodSeconds: 25
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: server
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: true
        # Built and pushed by the CD pipeline. Change the registry/owner to match
        # your DOCKER_USERNAME if it is not "grvp1".
        # NOTE: pin to an immutable :<git-sha> tag for real GitOps rollbacks;
        # :latest + Always is the pragmatic interim until image-tag write-back.
        image: docker.io/grvp1/reviewsservice:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 50051
        env:
        - name: PORT
          value: "50051"
        readinessProbe:
          periodSeconds: 5
          grpc:
            port: 50051
        livenessProbe:
          grpc:
            port: 50051
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: reviewsservice
  labels:
    app: reviewsservice
spec:
  type: ClusterIP
  selector:
    app: reviewsservice
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: reviewsservice
