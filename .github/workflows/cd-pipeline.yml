# =============================================================================
# CD Pipeline — Continuous Delivery via ArgoCD
# =============================================================================
# TRIGGER: Push to main branch (after staging approval)
# FLOW:    Build -> Push to Docker Hub -> Trigger ArgoCD Sync -> Notify
# =============================================================================
name: CD Pipeline

on:
  push:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # =========================================
  # Job 1: Build and Push Docker Images
  # =========================================
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, productcatalogservice]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================
  # Job 2: Trigger ArgoCD Sync
  # =========================================
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ArgoCD Application Sync
        run: |
          echo "=== Triggering ArgoCD sync for online-boutique ==="
          # ArgoCD REST API sync trigger (no CLI needed)
          curl -s -X POST \
            "https://${{ secrets.ARGOCD_SERVER }}/api/v1/applications/online-boutique/sync" \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"revision": "main", "prune": true}' \
            --insecure || echo "ArgoCD sync trigger sent (verify in ArgoCD UI)"

      - name: Wait for Health Check
        run: |
          echo "=== Waiting 60s for ArgoCD to sync and verify health ==="
          sleep 60
          echo "Deployment triggered. Verify in ArgoCD UI."

  # =========================================
  # Job 3: Post-Deploy Notification
  # =========================================
  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "CD Pipeline SUCCESS — Images pushed and ArgoCD sync triggered"
            echo "   Commit: ${{ github.sha }}"
            echo "   Branch: ${{ github.ref_name }}"
            echo "   Actor:  ${{ github.actor }}"
          else
            echo "CD Pipeline FAILED — Check ArgoCD and Docker Hub"
            echo "   Commit: ${{ github.sha }}"
          fi
