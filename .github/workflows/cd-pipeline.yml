# =============================================================================
# CD Pipeline — Continuous Delivery via ArgoCD
# =============================================================================
# TRIGGER: Push to main branch (after staging approval)
# FLOW:    Build -> Push to Docker Hub -> Trigger ArgoCD Sync -> Notify
# =============================================================================
name: CD Pipeline

on:
  push:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # =========================================
  # Job 1: Build and Push Docker Images
  # =========================================
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, productcatalogservice, reviewsservice]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================
  # Job 2: Trigger ArgoCD Sync
  # =========================================
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
    steps:
      - name: Trigger ArgoCD Application Sync
        run: |
          set -euo pipefail
          if [ -z "${ARGOCD_SERVER}" ] || [ -z "${ARGOCD_AUTH_TOKEN}" ]; then
            echo "::warning::ARGOCD_SERVER / ARGOCD_AUTH_TOKEN not configured — skipping automated sync."
            echo "Images are pushed to Docker Hub; sync manually (scripts/sync-app.sh) or set the secrets."
            exit 0
          fi
          echo "=== Triggering ArgoCD sync for online-boutique ==="
          # Fail the job (no '|| echo' swallow) if the sync genuinely fails, so a
          # broken deploy is never reported as green.
          http_code=$(curl -sS -o /tmp/sync.out -w "%{http_code}" -X POST \
            "https://${ARGOCD_SERVER}/api/v1/applications/online-boutique/sync" \
            -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"revision": "main", "prune": true}' \
            --insecure)
          echo "ArgoCD responded HTTP ${http_code}"
          cat /tmp/sync.out || true
          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "::error::ArgoCD sync failed (HTTP ${http_code})"
            exit 1
          fi

  # =========================================
  # Job 3: Post-Deploy Notification
  # =========================================
  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "CD Pipeline SUCCESS — Images pushed and ArgoCD sync triggered"
            echo "   Commit: ${{ github.sha }}"
            echo "   Branch: ${{ github.ref_name }}"
            echo "   Actor:  ${{ github.actor }}"
          else
            echo "CD Pipeline FAILED — Check ArgoCD and Docker Hub"
            echo "   Commit: ${{ github.sha }}"
          fi
