# =============================================================================
# CD Pipeline - Online Boutique DevOps
# =============================================================================
# WHAT: Runs ONLY when code is merged to main (production)
# WHY:  Automates the deployment so humans don't manually deploy
# WHEN: After Pull Request is approved and merged
# =============================================================================

name: "\U0001F680 CD Pipeline - Deploy to Production"

on:
  push:
    branches:
      - main

env:
  DOCKER_REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/boutique

jobs:
  # =========================================================================
  # JOB 1: Build & Push Production Images to Docker Hub
  # WHY: Production images are tagged with git SHA for traceability
  #      Every image in production can be traced back to exact commit
  # =========================================================================
  build-and-push:
    name: "\U0001F4E6 Build & Push to Registry"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: frontend
            context: src/frontend
          - name: productcatalogservice
            context: src/productcatalogservice
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build & Push ${{ matrix.service.name }}"
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # JOB 2: Deploy to Kubernetes
  # WHY: Automatically rolls out new version after successful build
  # NOTE: In real production, this would connect to EKS/GKE cluster
  #       For learning, this demonstrates the deployment pattern
  # =========================================================================
  deploy:
    name: "\u2638 Deploy to Kubernetes"
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      # In real production, you would configure kubeconfig here:
      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ap-south-1
      #
      # - name: Update kubeconfig for EKS
      #   run: aws eks update-kubeconfig --name online-boutique-cluster

      - name: Display deployment info
        run: |
          echo "============================================"
          echo "  DEPLOYMENT SUMMARY"
          echo "============================================"
          echo "  Branch:     ${{ github.ref_name }}"
          echo "  Commit:     ${{ github.sha }}"
          echo "  Author:     ${{ github.actor }}"
          echo "  Timestamp:  $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Images pushed to Docker Hub:"
          echo "    - ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}"
          echo "    - ${{ env.IMAGE_PREFIX }}-productcatalogservice:${{ github.sha }}"
          echo "============================================"

      # Validate manifests before applying
      - name: Validate manifests
        run: |
          kubectl apply --dry-run=client -f kubernetes-manifests/frontend.yaml
          kubectl apply --dry-run=client -f kubernetes-manifests/productcatalogservice.yaml
          echo "Manifests validated successfully!"

  # =========================================================================
  # JOB 3: Post-Deploy Notification
  # WHY: Team needs to know when production is updated
  # =========================================================================
  notify:
    name: "\U0001F4E3 Notify Team"
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ DEPLOYMENT SUCCESSFUL"
            echo "  Commit ${{ github.sha }} is now live in production"
          else
            echo "❌ DEPLOYMENT FAILED"
            echo "  Commit ${{ github.sha }} failed to deploy"
            echo "  Check logs for details"
          fi
          # In real production, you'd send Slack/Teams notification:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"Deployment ${{ github.sha }} completed"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
