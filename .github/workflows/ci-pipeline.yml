# =============================================================================
# CI Pipeline - Online Boutique DevOps
# =============================================================================
# WHAT: Runs on every push to develop/feature branches and on PRs to main
# WHY:  Catches bugs BEFORE they reach production
# WHO:  Every developer triggers this automatically on git push
# =============================================================================

name: "\U0001F504 CI Pipeline - Build & Test"

on:
  push:
    branches:
      - develop
      - 'feature/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

# Cancel previous runs if new commit pushed (saves CI minutes)
concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

env:
  GO_VERSION: '1.22'

jobs:
  # =========================================================================
  # JOB 1: Code Quality & Linting
  # WHY: Catches syntax errors, style violations BEFORE review
  # =========================================================================
  lint:
    name: "\U0001F50D Lint & Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run go vet (static analysis)
        run: |
          cd src/productcatalogservice
          go vet ./...

      - name: Check go mod tidy
        run: |
          cd src/productcatalogservice
          go mod tidy
          git diff --exit-code go.mod go.sum

  # =========================================================================
  # JOB 2: Unit Tests
  # WHY: Verifies business logic works correctly
  # =========================================================================
  test:
    name: "\U0001F9EA Unit Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests with coverage
        run: |
          cd src/productcatalogservice
          go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: src/productcatalogservice/coverage.out

  # =========================================================================
  # JOB 3: Build Docker Images
  # WHY: Ensures the container builds successfully before merging
  # =========================================================================
  build:
    name: "\U0001F433 Build Docker Images"
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service:
          - name: frontend
            context: src/frontend
          - name: productcatalogservice
            context: src/productcatalogservice
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: "Build ${{ matrix.service.name }}"
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: false
          tags: "boutique-${{ matrix.service.name }}:${{ github.sha }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # JOB 4: Security Scan
  # WHY: Detects vulnerabilities BEFORE deployment
  # =========================================================================
  security-scan:
    name: "\U0001F6E1 Security Vulnerability Scan"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'src/productcatalogservice'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'

  # =========================================================================
  # JOB 5: Validate Kubernetes Manifests
  # WHY: Catches YAML errors before they break the cluster
  # =========================================================================
  validate-manifests:
    name: "\u2638 Validate K8s Manifests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Dry-run validate all manifests
        run: |
          for manifest in kubernetes-manifests/*.yaml; do
            filename=$(basename "$manifest")
            if [ "$filename" != "kustomization.yaml" ]; then
              echo "Validating $manifest..."
              kubectl apply --dry-run=client -f "$manifest" 2>&1 || exit 1
            fi
          done
          echo "All manifests are valid!"
