# =============================================================================
# CI Pipeline - Online Boutique DevOps
# =============================================================================
# WHAT: Runs on every push to develop/feature branches and on PRs to main
# WHY:  Catches bugs BEFORE they reach production
# WHO:  Every developer triggers this automatically on git push
# =============================================================================

name: "CI Pipeline - Build and Test"

on:
  push:
    branches:
      - develop
      - 'feature/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

# Cancel previous runs if new commit pushed (saves CI minutes)
concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # =========================================================================
  # JOB 1: Code Quality & Linting
  # WHY: Catches syntax errors, style violations BEFORE review
  # =========================================================================
  lint:
    name: "Lint and Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/productcatalogservice/go.mod

      - name: Run go vet (static analysis)
        run: |
          cd src/productcatalogservice
          go vet ./...

  # =========================================================================
  # JOB 2: Unit Tests
  # WHY: Verifies business logic works correctly
  # =========================================================================
  test:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/productcatalogservice/go.mod

      - name: Run tests with coverage
        run: |
          cd src/productcatalogservice
          go test -v -coverprofile=coverage.out ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: src/productcatalogservice/coverage.out

  # =========================================================================
  # JOB 3: Build Docker Images
  # WHY: Ensures the container builds successfully before merging
  # =========================================================================
  build:
    name: "Build Docker Images"
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service:
          - name: frontend
            context: src/frontend
          - name: productcatalogservice
            context: src/productcatalogservice
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: "Build ${{ matrix.service.name }}"
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: false
          tags: "boutique-${{ matrix.service.name }}:${{ github.sha }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # JOB 4: Security Scan
  # WHY: Detects vulnerabilities BEFORE deployment
  # =========================================================================
  security-scan:
    name: "Security Vulnerability Scan"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'src/productcatalogservice'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'

  # =========================================================================
  # JOB 5: Validate Kubernetes Manifests
  # WHY: Catches YAML errors before they break the cluster
  # =========================================================================
  validate-manifests:
    name: "Validate K8s Manifests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate YAML syntax
        run: |
          echo "Validating Kubernetes manifest YAML syntax..."
          for manifest in kubernetes-manifests/*.yaml; do
            filename=$(basename "$manifest")
            if [ "$filename" = "kustomization.yaml" ]; then
              echo "Skipping $filename (Kustomize file)"
              continue
            fi
            # Check YAML is parseable
            python3 -c "
          import yaml, sys
          try:
              with open('$manifest') as f:
                  list(yaml.safe_load_all(f))
              print(f'  PASS: $manifest')
          except Exception as e:
              print(f'  FAIL: $manifest - {e}')
              sys.exit(1)
          "
          done
          echo "All manifests have valid YAML syntax!"
