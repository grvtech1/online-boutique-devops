# =============================================================================
# Ansible Inventory — Your 3 AWS Servers
# =============================================================================
# This tells Ansible WHICH servers to manage and HOW to connect
# =============================================================================

all:
  vars:
    ansible_user: ubuntu                          # Ubuntu AMI default user
    ansible_ssh_private_key_file: ../terraform/k8s-key.pem
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o ConnectTimeout=30'
    ansible_python_interpreter: /usr/bin/python3

  children:
    # --- K8s Control Plane ---
    masters:
      hosts:
        k8s-master:
          ansible_host: 13.207.14.35
          node_role: master

    # --- K8s Worker Nodes ---
    workers:
      hosts:
        k8s-worker-1:
          ansible_host: 3.109.4.146
          node_role: worker
        k8s-worker-2:
          ansible_host: 43.205.209.22
          node_role: worker
