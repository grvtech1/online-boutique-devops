# =============================================================================
# Production-Hardened Kubernetes Manifest for ProductCatalogService
# =============================================================================
# WHAT THIS FILE ADDS (vs the original):
#   1. startupProbe     — Handles slow container boot (prevents premature kill)
#   2. Resource tuning  — Right-sized for production traffic patterns
#   3. PodDisruptionBudget — Ensures availability during node maintenance
#   4. Annotations      — Prometheus scraping, deployment tracking
#   5. topologySpreadConstraints — Spreads pods across nodes for HA
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: productcatalogservice
  labels:
    app: productcatalogservice
    version: v1
    team: backend
    managed-by: github-actions
  annotations:
    # These annotations help SRE teams track what's deployed
    deployment.kubernetes.io/revision: "1"
    app.kubernetes.io/part-of: online-boutique
spec:
  replicas: 2  # Production: always run at least 2 for high availability
  selector:
    matchLabels:
      app: productcatalogservice
  # Rolling update strategy — zero downtime deployments
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # Add 1 new pod before killing old ones
      maxUnavailable: 0   # Never kill old pods until new ones are ready
  template:
    metadata:
      labels:
        app: productcatalogservice
        version: v1
      annotations:
        # Prometheus will automatically discover and scrape metrics from this pod
        prometheus.io/scrape: "true"
        prometheus.io/port: "3550"
        sidecar.istio.io/rewriteAppHTTPProbers: "true"
    spec:
      serviceAccountName: productcatalogservice
      terminationGracePeriodSeconds: 10
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000

      # Spread pods across different nodes for High Availability
      # If node-1 goes down, node-2 still has a running pod
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: productcatalogservice

      containers:
      - name: server
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: true
        image: productcatalogservice
        ports:
        - containerPort: 3550
          name: grpc
          protocol: TCP
        env:
        - name: PORT
          value: "3550"
        - name: DISABLE_PROFILER
          value: "1"
        # Pod identity — useful for debugging which pod is serving
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        # =================================================================
        # THREE TYPES OF HEALTH PROBES (Production Best Practice)
        # =================================================================

        # 1. STARTUP PROBE — "Has the app finished booting?"
        #    - Runs FIRST, before liveness/readiness
        #    - Gives slow-starting apps time to initialize
        #    - failureThreshold * periodSeconds = max startup time (30 * 2 = 60s)
        startupProbe:
          grpc:
            port: 3550
          initialDelaySeconds: 2
          periodSeconds: 2
          failureThreshold: 30

        # 2. READINESS PROBE — "Is the app ready to receive traffic?"
        #    - If this fails, K8s removes pod from Service endpoints
        #    - Pod stays alive but gets NO traffic (useful during overload)
        readinessProbe:
          grpc:
            port: 3550
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
          successThreshold: 1

        # 3. LIVENESS PROBE — "Is the app still alive?"
        #    - If this fails, K8s KILLS and RESTARTS the container
        #    - Last resort — use carefully (too aggressive = restart loops)
        livenessProbe:
          grpc:
            port: 3550
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 5

        # Production resource management
        resources:
          requests:    # Guaranteed minimum resources
            cpu: 100m      # 0.1 CPU core
            memory: 64Mi   # 64 MB RAM
          limits:      # Maximum cap (pod killed if exceeds memory)
            cpu: 200m      # 0.2 CPU core
            memory: 128Mi  # 128 MB RAM
---
apiVersion: v1
kind: Service
metadata:
  name: productcatalogservice
  labels:
    app: productcatalogservice
spec:
  type: ClusterIP
  selector:
    app: productcatalogservice
  ports:
  - name: grpc
    port: 3550
    targetPort: 3550
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: productcatalogservice
---
# =============================================================================
# PodDisruptionBudget — Ensures High Availability during maintenance
# =============================================================================
# WHAT: Tells K8s "you MUST keep at least 1 pod running at all times"
# WHEN: During node upgrades, cluster scaling, or maintenance windows
# WHY:  Without this, K8s could kill ALL pods simultaneously = outage
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: productcatalogservice-pdb
  labels:
    app: productcatalogservice
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: productcatalogservice
