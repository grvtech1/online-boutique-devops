# =============================================================================
# Secret for PaymentService
# =============================================================================
#
# WHAT IS A SECRET?
#   Like a ConfigMap, but for SENSITIVE data: passwords, API keys, tokens.
#   Kubernetes stores Secrets base64-encoded in etcd (the K8s database).
#
# ConfigMap vs Secret:
#   ConfigMap:  LOG_LEVEL=debug          <-- not sensitive, anyone can see
#   Secret:     DB_PASSWORD=s3cur3!      <-- sensitive, must be protected
#
# HOW BASE64 WORKS:
#   echo -n "stripe-live-sk-2026-gaurav-devops" | base64
#   → c3RyaXBlLWxpdmUtc2stMjAyNi1nYXVyYXYtZGV2b3Bz
#
#   base64 is NOT encryption! It is just encoding.
#   Anyone can decode it. In production, use:
#     - AWS Secrets Manager + External Secrets Operator
#     - HashiCorp Vault
#     - Sealed Secrets (Bitnami)
#
# REAL-WORLD USES:
#   - Database passwords
#   - API keys (Stripe, SendGrid, Twilio)
#   - TLS certificates
#   - Docker registry credentials
#   - OAuth client secrets
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: payment-secrets
  namespace: boutique
  labels:
    app: paymentservice
    managed-by: devops-learning
type: Opaque
# stringData lets you write plain text — K8s auto-encodes to base64
# This is easier than manually base64-encoding everything
stringData:
  PAYMENT_API_KEY: "stripe-live-sk-2026-gaurav-devops"
  PAYMENT_GATEWAY_URL: "https://api.stripe.com/v1"
  # In production, these values would come from:
  #   AWS Secrets Manager → External Secrets Operator → K8s Secret
  #   That way, secrets are NEVER stored in Git!
